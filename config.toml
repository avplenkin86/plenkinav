[params.summary]
  enable = true
  text   = """
Последние 15 лет:
- в различных ролях участвовал в полном цикле проектирования, разработки, внедрения, развития и сопровождения высоконагруженных распределённых систем федерального масштаба (ГИС, финтех) и ИТ-продуктов (платформы разработки, облачные сервисы, инфраструктурное ПО);
- управлял командами (линейными, матричными, кросс-функциональными), выстраивал процессы, внедрял Agile и DevOps-практики;
- проводил исследования в области обучения ML-моделей, применения LLM в SDLC;
- разрабатывал стандарты, методики и методологии.

Высшее инженерное образование по специализации «Метрологическое обеспечение производства» заложило системный подход к управлению качеством и надёжностью.

Ищу команду для работы над масштабными технологическими задачами, где востребованы системный подход, глубокая техническая экспертиза и умение доводить продукты до промышленного результата.
"""

